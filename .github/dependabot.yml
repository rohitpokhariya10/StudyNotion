version: 2

updates:
  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /server
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
