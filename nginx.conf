server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  server_tokens off;
  charset utf-8;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://accounts.google.com https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://accounts.google.com/gsi/style; font-src 'self' data:; img-src 'self' data: blob: https://res.cloudinary.com https://*.googleusercontent.com; media-src 'self' blob: https://api.cloudinary.com https://res.cloudinary.com; connect-src 'self' __API_ORIGIN__ https://accounts.google.com https://*.googleapis.com https://api.cloudinary.com https://api.razorpay.com https://*.razorpay.com https://res.cloudinary.com; frame-src https://accounts.google.com https://api.razorpay.com https://*.razorpay.com; worker-src 'self' blob:; manifest-src 'self'" always;

  location = /health {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
  }

  # Reset credentials live only in the browser URL fragment. Suppressing this
  # route from access logs is defense in depth against a future regression.
  location = /update-password {
    access_log off;
    try_files $uri /index.html;
    expires -1;
  }

  location / {
    try_files $uri $uri/ /index.html;
    expires -1;
  }

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types application/javascript application/json image/svg+xml text/css text/plain;
}
